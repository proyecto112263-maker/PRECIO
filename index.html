<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Precio Dólar</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap');

  /* ===== Carbon-inspired design tokens ===== */
  :root{
    --gray-100: #161616;
    --gray-90:  #262626;
    --gray-80:  #393939;
    --gray-70:  #525252;
    --gray-60:  #6f6f6f;
    --gray-40:  #a8a8a8;
    --gray-20:  #e0e0e0;
    --white:    #ffffff;

    --blue-60:  #0f62fe;
    --green-40: #42be65;
    --green-60: #24a148;
    --yellow-30:#f1c21b;
    --red-40:   #fa4d56;
    --red-60:   #da1e28;

    --border: var(--gray-80);
    --bg: var(--gray-100);
    --surface: #1c1c1c;
    --text-primary: #f4f4f4;
    --text-secondary: var(--gray-40);

    --font-sans: 'IBM Plex Sans', -apple-system, sans-serif;
    --font-mono: 'IBM Plex Mono', monospace;
  }

  *{ box-sizing: border-box; }
  html, body{ margin:0; padding:0; }

  body{
    background: var(--bg);
    color: var(--text-primary);
    font-family: var(--font-sans);
    font-size: 14px;
    line-height: 1.4;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    padding-bottom: 72px; /* espacio para la barra inferior fija */
  }

  a{ color: inherit; }

  /* ===== Top app bar ===== */
  .appbar{
    height: 48px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 16px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 10;
  }

  .appbar-title{
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0;
  }

  .appbar-status{
    display: flex;
    align-items: center;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-secondary);
  }

  .status-dot{
    width: 6px; height: 6px;
    background: var(--green-40);
    margin-right: 6px;
    flex-shrink: 0;
  }
  .status-dot.error{ background: var(--red-40); }

  /* ===== Section header (Carbon style: eyebrow + rule) ===== */
  .section-header{
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    padding: 20px 16px 8px;
    border-bottom: 1px solid var(--border);
  }

  .section-header .label{
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.02em;
    text-transform: uppercase;
    color: var(--text-secondary);
  }

  /* ===== Data rows: dense, table-like, no rounded corners ===== */
  .row{
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: center;
    padding: 14px 16px;
    border-bottom: 1px solid var(--gray-90);
  }

  .row-label{
    font-size: 13px;
    color: var(--text-secondary);
  }

  .row-value{
    font-family: var(--font-mono);
    font-size: 20px;
    font-weight: 500;
    font-variant-numeric: tabular-nums;
    text-align: right;
  }

  .row-value .unit{
    font-size: 11px;
    color: var(--text-secondary);
    font-weight: 400;
    margin-left: 4px;
  }

  .row.buy .row-value{ color: var(--green-40); }
  .row.sell .row-value{ color: var(--red-40); }

  /* ===== Ratio block ===== */
  .ratio-block{
    padding: 16px;
    border-bottom: 1px solid var(--border);
  }

  .ratio-top{
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }

  .ratio-value{
    font-family: var(--font-mono);
    font-size: 28px;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
  }

  /* Tag component, Carbon-style: rectangular, flat fill */
  .tag{
    display: inline-flex;
    align-items: center;
    padding: 3px 10px;
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.01em;
    white-space: nowrap;
    border: 1px solid transparent;
  }

  .tag.green{ background: rgba(66,190,101,0.16); color: var(--green-40); border-color: rgba(66,190,101,0.4); }
  .tag.yellow{ background: rgba(241,194,27,0.16); color: var(--yellow-30); border-color: rgba(241,194,27,0.4); }
  .tag.red{ background: rgba(250,77,86,0.16); color: var(--red-40); border-color: rgba(250,77,86,0.4); }

  /* barra de progreso lineal como indicador de posición del ratio (0 a 1) */
  .ratio-track{
    position: relative;
    height: 4px;
    background: var(--gray-80);
    width: 100%;
  }

  .ratio-marks{
    display: flex;
    justify-content: space-between;
    margin-top: 6px;
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--gray-60);
  }

  .ratio-fill{
    position: absolute;
    top: 0; left: 0; bottom: 0;
    width: 0%;
    background: var(--gray-40);
    transition: width 0.4s ease, background 0.4s ease;
  }

  .ratio-pointer{
    position: absolute;
    top: -3px;
    width: 2px;
    height: 10px;
    background: var(--white);
    transform: translateX(-1px);
    transition: left 0.4s ease;
  }

  /* ===== Meta row ===== */
  .meta-row{
    display: grid;
    grid-template-columns: 1fr 1fr;
  }

  .meta-cell{
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
  }

  .meta-cell:first-child{ border-right: 1px solid var(--border); }

  .meta-label{
    font-size: 11px;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.02em;
    margin-bottom: 4px;
  }

  .meta-value{
    font-family: var(--font-mono);
    font-size: 15px;
    font-weight: 500;
  }

  /* ===== Error banner (Carbon inline notification style) ===== */
  .error-banner{
    display: none;
    align-items: flex-start;
    gap: 10px;
    padding: 12px 16px;
    background: rgba(250,77,86,0.1);
    border-left: 3px solid var(--red-40);
    font-size: 12px;
    color: var(--text-primary);
    margin: 0 16px 0;
  }

  /* ===== Bottom fixed bar, thumb-reachable ===== */
  .bottombar{
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 56px;
    background: var(--gray-90);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 16px;
    padding-bottom: env(safe-area-inset-bottom);
  }

  .bottombar-text{
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-secondary);
  }

  .refresh-btn{
    -webkit-appearance: none;
    appearance: none;
    background: var(--blue-60);
    color: var(--white);
    border: none;
    font-family: var(--font-sans);
    font-size: 13px;
    font-weight: 600;
    padding: 10px 18px;
    min-height: 44px;
    min-width: 44px;
    cursor: pointer;
  }

  .refresh-btn:active{ background: #0043ce; }
  .refresh-btn:focus-visible{ outline: 2px solid var(--white); outline-offset: -4px; }

  /* Focus visibility for accessibility, Carbon requires visible 2px outline */
  a:focus-visible, button:focus-visible{
    outline: 2px solid var(--blue-60);
    outline-offset: 2px;
  }

  footer{
    padding: 16px;
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--gray-70);
  }
</style>
</head>
<body>

  <div class="appbar">
    <span class="appbar-title">Precio Dólar</span>
    <span class="appbar-status" id="status">
      <span class="status-dot" id="statusDot"></span><span id="statusText">cargando</span>
    </span>
  </div>

  <div class="error-banner" id="errorBox"></div>

  <div class="section-header">
    <span class="label">P2P</span>
  </div>
  <div class="row buy">
    <span class="row-label">Compra</span>
    <span class="row-value" id="p2p_compra">—<span class="unit">Bs.</span></span>
  </div>
  <div class="row sell">
    <span class="row-label">Venta</span>
    <span class="row-value" id="p2p_venta">—<span class="unit">Bs.</span></span>
  </div>

  <div class="section-header">
    <span class="label">Banco Central</span>
  </div>
  <div class="row buy">
    <span class="row-label">Compra</span>
    <span class="row-value" id="bcb_compra">—<span class="unit">Bs.</span></span>
  </div>
  <div class="row sell">
    <span class="row-label">Venta</span>
    <span class="row-value" id="bcb_venta">—<span class="unit">Bs.</span></span>
  </div>

  <div class="section-header">
    <span class="label">Ratio de liquidez</span>
  </div>
  <div class="ratio-block">
    <div class="ratio-top">
      <span class="ratio-value" id="ratio_num">—</span>
      <span class="tag" id="ratio_tag">—</span>
    </div>
    <div class="ratio-track">
      <div class="ratio-fill" id="ratio_fill"></div>
      <div class="ratio-pointer" id="ratio_pointer" style="left:0%"></div>
    </div>
    <div class="ratio-marks">
      <span>0.00</span>
      <span>0.35</span>
      <span>0.60</span>
      <span>1.00</span>
    </div>
  </div>

  <div class="meta-row">
    <div class="meta-cell">
      <div class="meta-label">Fecha</div>
      <div class="meta-value" id="fecha">—</div>
    </div>
    <div class="meta-cell">
      <div class="meta-label">Hora</div>
      <div class="meta-value" id="hora">—</div>
    </div>
  </div>

  <footer>Proyecto Hugo</footer>

  <div class="bottombar">
    <span class="bottombar-text" id="lastUpdate">Sin actualizar</span>
    <button class="refresh-btn" id="refreshBtn">Actualizar</button>
  </div>

<script>
  const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTf7dd0jhXZizVAdJZ66p4qcO3yYF5U7gvs29f81WiX6UHse00zeBr8keuJhBeU28JpXE7gbOv-gfCE/pub?gid=1813400485&single=true&output=csv";
  const REFRESH_MS = 60 * 1000;

  function parseCSV(text){
    const lines = text.trim().split("\n").filter(l => l.length > 0);
    return lines.map(line => line.split(",").map(cell => cell.trim().replace(/^"|"$/g, "")));
  }

  function setStatus(ok, msg){
    document.getElementById('statusDot').classList.toggle('error', !ok);
    document.getElementById('statusText').textContent = msg;
  }

  function showError(msg){
    const box = document.getElementById('errorBox');
    box.style.display = 'flex';
    box.textContent = msg;
  }

  function hideError(){
    document.getElementById('errorBox').style.display = 'none';
  }

  function actualizarRatio(valor){
    const num = Number(valor);
    const numEl = document.getElementById('ratio_num');
    const tagEl = document.getElementById('ratio_tag');
    const fillEl = document.getElementById('ratio_fill');
    const pointerEl = document.getElementById('ratio_pointer');

    numEl.textContent = isNaN(num) ? '—' : num.toFixed(2);

    let color, texto, cssVar;
    if(isNaN(num)){
      color = 'green'; texto = '—'; cssVar = 'var(--gray-40)';
    } else if(num < 0.35){
      color = 'green'; texto = 'Posible subida'; cssVar = 'var(--green-40)';
    } else if(num <= 0.6){
      color = 'yellow'; texto = 'Posible estabilización'; cssVar = 'var(--yellow-30)';
    } else {
      color = 'red'; texto = 'Posible bajada'; cssVar = 'var(--red-40)';
    }

    tagEl.className = 'tag ' + color;
    tagEl.textContent = texto;
    numEl.style.color = cssVar;

    const pct = isNaN(num) ? 0 : Math.min(Math.max(num, 0), 1) * 100;
    fillEl.style.width = pct + '%';
    fillEl.style.background = cssVar;
    pointerEl.style.left = pct + '%';
  }

  async function cargarDatos(){
    setStatus(true, 'actualizando');
    try{
      const res = await fetch(CSV_URL + (CSV_URL.includes('?') ? '&' : '?') + 'cachebust=' + Date.now());
      if(!res.ok) throw new Error('HTTP ' + res.status);
      const text = await res.text();
      const rows = parseCSV(text);

      if(rows.length < 2) throw new Error('Sin filas de datos');

      const ultimaFila = rows[rows.length - 1];
      const [fecha, hora, p2pCompra, p2pVenta, bcbCompra, bcbVenta, ratioLiquidez] = ultimaFila;

      document.getElementById('fecha').textContent = fecha || '—';
      document.getElementById('hora').textContent = hora || '—';
      document.getElementById('p2p_compra').innerHTML = (Number(p2pCompra).toFixed(2) || '—') + '<span class="unit">Bs.</span>';
      document.getElementById('p2p_venta').innerHTML = (Number(p2pVenta).toFixed(2) || '—') + '<span class="unit">Bs.</span>';
      document.getElementById('bcb_compra').innerHTML = (Number(bcbCompra).toFixed(2) || '—') + '<span class="unit">Bs.</span>';
      document.getElementById('bcb_venta').innerHTML = (Number(bcbVenta).toFixed(2) || '—') + '<span class="unit">Bs.</span>';
      actualizarRatio(ratioLiquidez);

      hideError();
      const now = new Date().toLocaleTimeString('es-BO');
      setStatus(true, 'en línea');
      document.getElementById('lastUpdate').textContent = 'Actualizado ' + now;
    } catch(err){
      showError('Error al cargar datos: ' + err.message);
      setStatus(false, 'error');
      console.error(err);
    }
  }

  document.getElementById('refreshBtn').addEventListener('click', cargarDatos);

  cargarDatos();
  setInterval(cargarDatos, REFRESH_MS);
</script>

</body>
</html>
