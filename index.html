<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Precio Dólar</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap');

  :root{
    --bg: #0e1512;
    --panel: #16211c;
    --line: rgba(232,168,80,0.14);
    --amber: #e8a850;
    --teal: #4fd1b8;
    --red: #ea6a58;
    --text: #f2ede2;
    --muted: #74897f;
    --display: 'Space Grotesk', sans-serif;
    --mono: 'IBM Plex Mono', monospace;
  }

  *{ box-sizing: border-box; }

  html, body{
    margin:0; padding:0; min-height:100vh;
    background: var(--bg);
    color: var(--text);
    font-family: var(--display);
  }

  .wrap{
    max-width: 760px;
    margin: 0 auto;
    padding: 64px 28px 60px;
  }

  header{
    text-align: center;
    margin-bottom: 50px;
  }

  h1{
    font-size: 46px;
    font-weight: 700;
    margin: 0;
    letter-spacing: -0.01em;
    color: var(--text);
  }

  .status{
    display: inline-flex;
    align-items: center;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
    margin-top: 14px;
  }

  .dot{
    display:inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--teal);
    margin-right: 7px;
    box-shadow: 0 0 8px var(--teal);
    animation: pulse 2s infinite;
  }

  @keyframes pulse{
    0%,100%{ opacity: 1; }
    50%{ opacity: 0.3; }
  }

  .section-title{
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--amber);
    margin: 0 0 14px;
    text-align: center;
  }

  .panel-row{
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1px;
    background: var(--line);
    border: 1px solid var(--line);
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 36px;
  }

  .panel{
    background: var(--panel);
    padding: 28px 22px;
    text-align: center;
  }

  .panel-label{
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    margin: 0 0 14px;
  }

  .panel-value{
    font-size: 40px;
    font-weight: 700;
    line-height: 1;
  }

  .panel-value sup{
    font-family: var(--mono);
    font-size: 13px;
    color: var(--muted);
    font-weight: 400;
    margin-left: 6px;
  }

  .panel.buy .panel-value{ color: var(--teal); }
  .panel.sell .panel-value{ color: var(--red); }

  .meta-row{
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 1px;
    background: var(--line);
    border: 1px solid var(--line);
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 46px;
  }

  .meta{
    background: rgba(22,33,28,0.7);
    padding: 16px 18px;
    text-align: center;
  }

  .meta-label{
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin: 0 0 6px;
  }

  .meta-value{
    font-family: var(--mono);
    font-size: 16px;
    font-weight: 500;
    color: var(--text);
  }

  footer{
    text-align: center;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.08em;
    color: var(--muted);
    opacity: 0.6;
  }

  .error-box{
    background: rgba(234,106,88,0.08);
    border: 1px solid rgba(234,106,88,0.3);
    color: var(--red);
    border-radius: 10px;
    padding: 14px 18px;
    font-family: var(--mono);
    font-size: 12px;
    margin-bottom: 24px;
    display: none;
    text-align: center;
  }

  @media (max-width: 520px){
    .panel-row, .meta-row{ grid-template-columns: 1fr 1fr; }
    .meta-row{ grid-template-columns: 1fr 1fr; }
    .meta:last-child{ grid-column: span 2; }
    .panel-value{ font-size: 32px; }
    h1{ font-size: 32px; }
  }
</style>
</head>
<body>

<div class="wrap">

  <header>
    <h1>Precio Dólar</h1>
    <div class="status" id="status">
      <span class="dot"></span>cargando…
    </div>
  </header>

  <div class="error-box" id="errorBox"></div>

  <p class="section-title">P2P</p>
  <div class="panel-row">
    <div class="panel buy">
      <p class="panel-label">Compra</p>
      <div class="panel-value" id="p2p_compra">—<sup>Bs.</sup></div>
    </div>
    <div class="panel sell">
      <p class="panel-label">Venta</p>
      <div class="panel-value" id="p2p_venta">—<sup>Bs.</sup></div>
    </div>
  </div>

  <p class="section-title">Banco Central</p>
  <div class="panel-row">
    <div class="panel buy">
      <p class="panel-label">Compra</p>
      <div class="panel-value" id="bcb_compra">—<sup>Bs.</sup></div>
    </div>
    <div class="panel sell">
      <p class="panel-label">Venta</p>
      <div class="panel-value" id="bcb_venta">—<sup>Bs.</sup></div>
    </div>
  </div>

  <div class="meta-row">
    <div class="meta">
      <p class="meta-label">Fecha</p>
      <p class="meta-value" id="fecha">—</p>
    </div>
    <div class="meta">
      <p class="meta-label">Hora</p>
      <p class="meta-value" id="hora">—</p>
    </div>
    <div class="meta">
      <p class="meta-label">Ratio liquidez</p>
      <p class="meta-value" id="liquidez">—</p>
    </div>
  </div>

  <footer>Proyecto Hugo</footer>

</div>

<script>
  const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTf7dd0jhXZizVAdJZ66p4qcO3yYF5U7gvs29f81WiX6UHse00zeBr8keuJhBeU28JpXE7gbOv-gfCE/pub?gid=1813400485&single=true&output=csv";

  const REFRESH_MS = 60 * 1000;

  function parseCSV(text){
    const lines = text.trim().split("\n").filter(l => l.length > 0);
    return lines.map(line => line.split(",").map(cell => cell.trim().replace(/^"|"$/g, "")));
  }

  function setStatus(ok, msg){
    const el = document.getElementById('status');
    if(ok){
      el.innerHTML = '<span class="dot"></span>' + msg;
    } else {
      el.innerHTML = '<span class="dot" style="background:var(--red);box-shadow:0 0 8px var(--red)"></span>' + msg;
    }
  }

  function showError(msg){
    const box = document.getElementById('errorBox');
    box.style.display = 'block';
    box.textContent = msg;
  }

  function hideError(){
    document.getElementById('errorBox').style.display = 'none';
  }

  async function cargarDatos(){
    try{
      const res = await fetch(CSV_URL + (CSV_URL.includes('?') ? '&' : '?') + 'cachebust=' + Date.now());
      if(!res.ok) throw new Error('HTTP ' + res.status);
      const text = await res.text();
      const rows = parseCSV(text);

      if(rows.length < 2) throw new Error('Sin filas de datos');

      const ultimaFila = rows[rows.length - 1];
      const [fecha, hora, p2pCompra, p2pVenta, bcbCompra, bcbVenta, ratioLiquidez] = ultimaFila;

      document.getElementById('fecha').textContent = fecha || '—';
      document.getElementById('hora').textContent = hora || '—';
      document.getElementById('p2p_compra').innerHTML = (Number(p2pCompra).toFixed(2) || '—') + '<sup>Bs.</sup>';
      document.getElementById('p2p_venta').innerHTML = (Number(p2pVenta).toFixed(2) || '—') + '<sup>Bs.</sup>';
      document.getElementById('bcb_compra').innerHTML = (Number(bcbCompra).toFixed(2) || '—') + '<sup>Bs.</sup>';
      document.getElementById('bcb_venta').innerHTML = (Number(bcbVenta).toFixed(2) || '—') + '<sup>Bs.</sup>';
      document.getElementById('liquidez').textContent = ratioLiquidez || '—';

      hideError();
      setStatus(true, 'actualizado ' + new Date().toLocaleTimeString('es-BO'));
    } catch(err){
      showError('Error al cargar datos: ' + err.message);
      setStatus(false, 'error');
      console.error(err);
    }
  }

  cargarDatos();
  setInterval(cargarDatos, REFRESH_MS);
</script>

</body>
</html>
