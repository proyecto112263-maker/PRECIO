<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>

:root{

--bg:#070809;
--panel:#101214;
--panel2:#15181b;

--line:#202327;

--text:#F3F5F7;
--text2:#B4BBC4;
--text3:#6C737D;

--blue:#49A6FF;
--green:#43D889;
--red:#FF6666;
--orange:#F5A623;

--accent:#49A6FF;

--radius:6px;

--s1:4px;
--s2:8px;
--s3:12px;
--s4:16px;
--s5:20px;
--s6:24px;

--safe-top:env(safe-area-inset-top,0px);
--safe-bottom:env(safe-area-inset-bottom,0px);
--safe-left:env(safe-area-inset-left,0px);
--safe-right:env(safe-area-inset-right,0px);

}

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
-webkit-touch-callout:none;
-webkit-user-select:none;
user-select:none;
}

html{

height:100%;
height:-webkit-fill-available;

}

/* ===== FONDO LATERAL (detrás de la tarjeta central) ===== */

body{

height:100%;
min-height:-webkit-fill-available;

background:#050608;

color:var(--text);

font-family:Inter,sans-serif;

font-size:14px;

overflow-x:hidden;
overscroll-behavior-y:contain;
-webkit-overflow-scrolling:touch;

}

#sceneBackdrop{

position:fixed;

inset:0;

z-index:0;

overflow:hidden;

background:#050608;

transition:background 1s ease;

}

#sceneBackdrop svg{

width:100%;

height:100%;

display:block;

}

@keyframes twinkle{

0%,100%{opacity:.2;}

50%{opacity:1;}

}

.star{

animation:twinkle 3s ease-in-out infinite;

}

button{

font:inherit;

border:none;

background:none;

color:inherit;

cursor:pointer;

}

/* ===== TARJETA CENTRAL — SIEMPRE PROFESIONAL, SIN CAMBIOS POR HORA ===== */

.app{

position:relative;

z-index:1;

max-width:460px;

margin:auto;

min-height:100vh;
min-height:-webkit-fill-available;

display:flex;

flex-direction:column;

background:var(--bg);

box-shadow:0 0 60px rgba(0,0,0,.55);

border-left:1px solid var(--line);

border-right:1px solid var(--line);

}

header{

height:calc(56px + var(--safe-top));

padding-top:var(--safe-top);

display:flex;

align-items:center;

justify-content:space-between;

padding-left:calc(18px + var(--safe-left));
padding-right:calc(18px + var(--safe-right));

border-bottom:1px solid var(--line);

position:sticky;

top:0;

background:#070809ee;

backdrop-filter:blur(20px);

z-index:100;

overflow:visible;

}

.logo{

display:flex;

align-items:center;

gap:10px;

position:relative;

overflow:visible;

}

.logoDot{

width:8px;

height:8px;

background:var(--blue);

border-radius:2px;

}

.logoText{

font-size:15px;

font-weight:700;

letter-spacing:.06em;

text-transform:uppercase;

}

/* ===== PERRO CORRIENDO + LETRERO "ACTUALIZADO" (junto al Índice de Liquidez) ===== */

.updateToast{

position:relative;

height:0;

opacity:0;

overflow:hidden;

margin:0 auto;

max-width:280px;

transition:height .35s ease, opacity .35s ease, margin .35s ease;

}

.updateToast.show{

height:64px;

opacity:1;

margin-bottom:14px;

}

.toastDog{

position:absolute;

top:6px;

left:-90px;

width:76px;

height:48px;

}

.toastDog svg{

width:100%;

height:100%;

display:block;

}

.updateToast.show .toastDog{

animation:dogRun 1.7s cubic-bezier(.32,.1,.28,1) forwards;

}

.updateToast.show .dogLeg1,
.updateToast.show .dogLeg3{

animation:legRun .16s ease-in-out infinite;

}

.updateToast.show .dogLeg2,
.updateToast.show .dogLeg4{

animation:legRun .16s ease-in-out infinite reverse;

}

@keyframes dogRun{

0%{

left:-90px;

}

75%{

left:calc(100% - 86px);

}

100%{

left:calc(100% - 86px);

}

}

.toastBubble{

position:absolute;

top:10px;

right:0;

background:var(--green);

color:#06170e;

font-weight:700;

font-size:15px;

padding:8px 16px;

border-radius:20px;

white-space:nowrap;

box-shadow:0 4px 14px rgba(67,216,137,.35);

opacity:0;

transform:translateY(6px);

transition:opacity .35s ease, transform .35s ease;

}

.updateToast.show .toastBubble{

opacity:1;

transform:translateY(0);

transition-delay:1.15s;

}

@keyframes legRun{

0%,100%{transform:rotate(24deg);}

50%{transform:rotate(-24deg);}

}

.headerRight{

display:flex;

align-items:center;

gap:12px;

}



.timeIcon{

width:20px;

height:20px;

display:flex;

align-items:center;

justify-content:center;

color:var(--accent);

}

.timeIcon svg{

width:100%;

height:100%;

}

.live{

display:flex;

align-items:center;

gap:6px;

font-size:11px;

color:var(--text2);

font-family:"IBM Plex Mono",monospace;

}

.liveIndicator{

width:6px;

height:6px;

border-radius:50%;

background:var(--green);

box-shadow:0 0 8px var(--green);

}

main{

flex:1;

padding:16px;
padding-left:calc(16px + var(--safe-left));
padding-right:calc(16px + var(--safe-right));

padding-bottom:calc(90px + var(--safe-bottom));

}

.screenTitle{

font-size:12px;

color:var(--text3);

letter-spacing:.18em;

text-transform:uppercase;

margin-bottom:12px;

font-weight:600;

}

.module{

margin-bottom:18px;

}

.moduleHeader{

display:flex;

justify-content:space-between;

align-items:center;

margin-bottom:8px;

}

.moduleTitle{

font-size:13px;

font-weight:700;

letter-spacing:.08em;

text-transform:uppercase;

}

.moduleIndex{

font-size:11px;

font-family:"IBM Plex Mono",monospace;

color:var(--text3);

}

.table{

border-top:1px solid var(--line);

}

.item{

display:flex;

justify-content:space-between;

align-items:center;

padding:13px 2px;

border-bottom:1px solid var(--line);

}

.left{

display:flex;

align-items:center;

gap:10px;

}

.bar{

width:3px;

height:26px;

border-radius:20px;

background:#444;

}

.item.buy .bar{

background:var(--green);

}

.item.sell .bar{

background:var(--red);

}

.label{

font-size:13px;

color:var(--text2);

}

.value{

font-family:"IBM Plex Mono",monospace;

font-size:22px;

font-weight:600;

}

.buy .value{

color:var(--green);

}

.sell .value{

color:var(--red);

}

.unit{

font-size:11px;

color:var(--text3);

margin-left:4px;

}

/* ===== Índice de Liquidez: cuadro centrado tipo botón ===== */

.ratioModule{

display:flex;

flex-direction:column;

align-items:center;

}

.ratioBox{

position:relative;

overflow:hidden;

width:100%;

max-width:280px;

border:1px solid var(--line);

border-radius:14px;

background:var(--panel);

padding:20px 22px 18px;

display:flex;

flex-direction:column;

align-items:center;

text-align:center;

box-shadow:0 0 0 1px rgba(255,255,255,0.02) inset;

transition:.2s;

}

.ratioBox:active{

background:var(--panel2);

}

.cardScene{

position:absolute;

inset:0;

z-index:0;

overflow:hidden;

pointer-events:none;

}

.cardScene svg{

width:100%;

height:100%;

display:block;

opacity:.24;

}

.ratioContent{

position:relative;

z-index:1;

display:flex;

flex-direction:column;

align-items:center;

width:100%;

}

.ratioTitle{

font-size:11px;

letter-spacing:.16em;

text-transform:uppercase;

color:var(--text3);

font-weight:600;

margin-bottom:10px;

}

.ratioNumber{

font-family:"IBM Plex Mono",monospace;

font-size:34px;

font-weight:700;

margin-bottom:14px;

}

.progress{

width:100%;

height:4px;

background:#1A1D21;

overflow:hidden;

border-radius:10px;

}

.progressFill{

height:100%;

width:0%;

background:var(--green);

transition:.35s;

}

.scale{

display:flex;

justify-content:space-between;

width:100%;

margin-top:8px;

font-size:10px;

font-family:"IBM Plex Mono",monospace;

color:var(--text3);

}

.infoGrid{

display:grid;

grid-template-columns:1fr 1fr;

margin-top:20px;

border-top:1px solid var(--line);

border-bottom:1px solid var(--line);

}

.info{

padding:14px 0;

}

.info:first-child{

padding-right:10px;

border-right:1px solid var(--line);

}

.info:last-child{

padding-left:14px;

}

.infoLabel{

font-size:10px;

letter-spacing:.15em;

text-transform:uppercase;

color:var(--text3);

margin-bottom:5px;

}

.infoValue{

font-size:15px;

font-family:"IBM Plex Mono",monospace;

}

.error{

display:none;

margin-bottom:14px;

padding:10px 12px;

background:#301313;

border-left:2px solid var(--red);

font-size:12px;

color:#fff;

}

.bottomBar{

position:fixed;

left:0;

right:0;

bottom:0;

height:calc(66px + var(--safe-bottom));

padding-bottom:var(--safe-bottom);

padding-left:var(--safe-left);
padding-right:var(--safe-right);

background:#0E1012;

border-top:1px solid var(--line);

display:flex;

max-width:460px;

margin:auto;

z-index:2;

}

.nav{

flex:1;

display:flex;

flex-direction:column;

justify-content:center;

align-items:center;

gap:5px;

font-size:10px;

text-transform:uppercase;

letter-spacing:.08em;

color:var(--text3);

position:relative;

}

.nav svg{

width:20px;

height:20px;

}

.nav.active{

color:var(--blue);

}

.nav.active::before{

content:"";

position:absolute;

top:0;

width:24px;

height:2px;

background:var(--blue);

}

footer{

padding:16px 0;

font-size:10px;

text-align:center;

color:var(--text3);

font-family:"IBM Plex Mono",monospace;

}

@media(max-width:360px){

.value{

font-size:19px;

}

.ratioNumber{

font-size:30px;

}

.logoText{

font-size:14px;

}

}

</style>

</head>

function aplicarTemaSegunHora(){

const h=new Date().getHours();

const icon=document.getElementById("timeIcon");

const backdrop=document.getElementById("sceneBackdrop");

const cardScene=document.getElementById("cardScene");

if(h>=7 && h<12){

icon.innerHTML=ICON_SUN;

backdrop.innerHTML=SCENE_MORNING;

cardScene.innerHTML=SCENE_MORNING;

}else if(h>=12 && h<18){

icon.innerHTML=ICON_CLOUD;

backdrop.innerHTML=SCENE_AFTERNOON;

cardScene.innerHTML=SCENE_AFTERNOON;

}else{

icon.innerHTML=ICON_MOON;

backdrop.innerHTML=SCENE_NIGHT;

cardScene.innerHTML=SCENE_NIGHT;

}

}

/* ===== PERRO + LETRERO "¡ACTUALIZADO!" JUNTO AL ÍNDICE DE LIQUIDEZ ===== */

let toastTimer=null;

function lanzarGato(){

const toast=document.getElementById("updateToast");

clearTimeout(toastTimer);

toast.classList.remove("show");

void toast.offsetWidth;

toast.classList.add("show");

toastTimer=setTimeout(function(){

toast.classList.remove("show");

},2600);

}

function parseCSV(text){

return text
.trim()
.split("\n")
.filter(l=>l.length)
.map(l=>l.split(",").map(c=>c.trim().replace(/^"|"$/g,"")));

}

function setLive(ok,msg){

const dot=document.getElementById("liveDot");

dot.style.background=ok?"var(--green)":"var(--red)";
dot.style.boxShadow=ok
?"0 0 8px var(--green)"
:"0 0 8px var(--red)";

document.getElementById("liveText").textContent=msg;

}

function showError(msg){

const box=document.getElementById("errorBox");

box.style.display="block";

box.textContent=msg;

}

function hideError(){

document.getElementById("errorBox").style.display="none";

}

function actualizarRatio(valor){

const n=parseFloat(valor);

const num=document.getElementById("ratio_num");

const fill=document.getElementById("ratio_fill");

if(isNaN(n)){

num.textContent="—";

num.style.color="var(--text)";

fill.style.width="0%";

return;

}

num.textContent=n.toFixed(2);

let color;

if(n<0.35){

color="var(--green)";

}else if(n<=0.60){

color="var(--orange)";

}else{

color="var(--red)";

}

num.style.color=color;

fill.style.width=(Math.min(n,1)*100)+"%";

fill.style.background=color;

}

async function cargarDatos(){

setLive(true,"Actualizando");

try{

const r=await fetch(
CSV_URL+"&t="+Date.now()
);

if(!r.ok){

throw new Error("HTTP "+r.status);

}

const txt=await r.text();

const rows=parseCSV(txt);

const u=rows[rows.length-1];

const[
fecha,
hora,
p2pCompra,
p2pVenta,
bcbCompra,
bcbVenta,
ratio
]=u;

document.getElementById("fecha").textContent=fecha||"—";

document.getElementById("hora").textContent=hora||"—";

document.getElementById("p2p_compra").innerHTML=
Number(p2pCompra).toFixed(2)+
'<span class="unit"> Bs.</span>';

document.getElementById("p2p_venta").innerHTML=
Number(p2pVenta).toFixed(2)+
'<span class="unit"> Bs.</span>';

document.getElementById("bcb_compra").innerHTML=
Number(bcbCompra).toFixed(2)+
'<span class="unit"> Bs.</span>';

document.getElementById("bcb_venta").innerHTML=
Number(bcbVenta).toFixed(2)+
'<span class="unit"> Bs.</span>';

actualizarRatio(ratio);

hideError();

setLive(true,"En línea");

}catch(e){

console.error(e);

showError("Error al obtener datos");

setLive(false,"Sin conexión");

}

}

document
.getElementById("refreshNav")
.addEventListener("click",function(){

lanzarGato();

cargarDatos();

});

aplicarTemaSegunHora();

cargarDatos();

setInterval(cargarDatos,REFRESH_MS);

setInterval(aplicarTemaSegunHora,60000);

</script>
