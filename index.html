<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0">
<title>Precio Dólar</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow+Semi+Condensed:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap');

  /* ===================================================
     Design tokens — dark cinematic console UI
     =================================================== */
  :root{
    --bg:        #0a0b0d;
    --surface:   #0f1113;
    --surface-2: #15171a;
    --line:      #212428;
    --line-soft: #1a1c1f;

    --text-hi:   #f2f4f7;
    --text-md:   #9aa1ac;
    --text-lo:   #5d636d;

    --blue:      #3ea6ff;
    --blue-dim:  #1c5b91;

    --green:     #3ddc84;
    --amber:     #f5a623;
    --red:       #ff5a52;

    --f-display: 'Barlow Semi Condensed', sans-serif;
    --f-body:    'Inter', -apple-system, sans-serif;
    --f-mono:    'IBM Plex Mono', monospace;

    --sp-1: 4px;
    --sp-2: 8px;
    --sp-3: 12px;
    --sp-4: 16px;
    --sp-5: 20px;
    --sp-6: 24px;

    --radius: 4px;
  }

  *{ box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body{
    margin:0; padding:0;
    background: var(--bg);
    color: var(--text-hi);
    font-family: var(--f-body);
    font-size: 14px;
    line-height: 1.35;
    -webkit-font-smoothing: antialiased;
    height: 100%;
    overscroll-behavior-y: contain;
  }

  button{ font-family: inherit; }

  /* ===================================================
     Top bar — compact, identity + live status only
     =================================================== */
  .topbar{
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 var(--sp-4);
    border-bottom: 1px solid var(--line);
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 20;
  }

  .brand{
    display: flex;
    align-items: baseline;
    gap: 6px;
  }

  .brand-mark{
    width: 6px; height: 6px;
    background: var(--blue);
    flex-shrink: 0;
  }

  .brand-title{
    font-family: var(--f-display);
    font-weight: 600;
    font-size: 15px;
    letter-spacing: 0.02em;
    text-transform: uppercase;
  }

  .live{
    display: flex;
    align-items: center;
    gap: 5px;
    font-family: var(--f-mono);
    font-size: 10px;
    color: var(--text-md);
    letter-spacing: 0.02em;
  }

  .live-dot{
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 6px var(--green);
  }
  .live-dot.off{ background: var(--red); box-shadow: 0 0 6px var(--red); }

  @keyframes blink{ 50%{ opacity: 0.35; } }
  .live-dot.pulsing{ animation: blink 1.6s ease-in-out infinite; }

  /* ===================================================
     Scroll area
     =================================================== */
  .content{
    padding-bottom: 88px; /* espacio sobre la barra inferior fija */
  }

  /* Section label — condensed, tracked, minimal */
  .section-label{
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: var(--sp-5) var(--sp-4) var(--sp-2);
  }

  .section-label span{
    font-family: var(--f-display);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-md);
  }

  .section-label .idx{
    font-family: var(--f-mono);
    font-size: 10px;
    color: var(--text-lo);
  }

  /* ===================================================
     List row — thin separators, no cards
     =================================================== */
  .list{
    border-top: 1px solid var(--line-soft);
  }

  .row{
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: var(--sp-4);
    border-bottom: 1px solid var(--line-soft);
    background: var(--bg);
  }

  .row-left{
    display: flex;
    align-items: center;
    gap: var(--sp-3);
  }

  .row-chip{
    width: 3px;
    height: 28px;
    background: var(--line);
    flex-shrink: 0;
  }

  .row.buy .row-chip{ background: var(--green); }
  .row.sell .row-chip{ background: var(--red); }

  .row-label{
    font-size: 13px;
    color: var(--text-md);
    font-weight: 500;
  }

  .row-value{
    font-family: var(--f-mono);
    font-size: 22px;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.01em;
  }

  .row-value .unit{
    font-size: 11px;
    color: var(--text-lo);
    font-weight: 400;
    margin-left: 4px;
  }

  .row.buy .row-value{ color: var(--green); }
  .row.sell .row-value{ color: var(--red); }

  /* ===================================================
     Ratio module — inline bar, PS5 storage-bar style
     =================================================== */
  .ratio-module{
    padding: var(--sp-4);
    border-top: 1px solid var(--line-soft);
    border-bottom: 1px solid var(--line-soft);
  }

  .ratio-head{
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: var(--sp-3);
  }

  .ratio-value{
    font-family: var(--f-mono);
    font-size: 26px;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
  }

  .ratio-tag{
    font-family: var(--f-mono);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.03em;
    padding: 3px 8px;
    border-radius: var(--radius);
    text-transform: uppercase;
  }

  .ratio-tag.green{ color: var(--green); background: rgba(61,220,132,0.12); }
  .ratio-tag.amber{ color: var(--amber); background: rgba(245,166,35,0.12); }
  .ratio-tag.red{   color: var(--red);   background: rgba(255,90,82,0.12); }

  .ratio-bar{
    position: relative;
    height: 3px;
    background: var(--line);
    display: flex;
  }

  .ratio-bar-fill{
    height: 100%;
    width: 0%;
    background: var(--green);
    transition: width 0.35s ease, background 0.35s ease;
  }

  .ratio-ticks{
    display: flex;
    justify-content: space-between;
    margin-top: 6px;
    font-family: var(--f-mono);
    font-size: 9px;
    color: var(--text-lo);
  }

  /* ===================================================
     Meta grid — fecha / hora
     =================================================== */
  .meta-grid{
    display: grid;
    grid-template-columns: 1fr 1fr;
  }

  .meta-cell{
    padding: var(--sp-3) var(--sp-4);
    border-bottom: 1px solid var(--line-soft);
  }

  .meta-cell + .meta-cell{ border-left: 1px solid var(--line-soft); }

  .meta-label{
    font-size: 10px;
    color: var(--text-lo);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 3px;
  }

  .meta-value{
    font-family: var(--f-mono);
    font-size: 14px;
    color: var(--text-hi);
  }

  /* ===================================================
     Error banner
     =================================================== */
  .error-banner{
    display: none;
    align-items: center;
    gap: var(--sp-2);
    padding: var(--sp-3) var(--sp-4);
    background: rgba(255,90,82,0.08);
    border-left: 2px solid var(--red);
    font-size: 12px;
    color: var(--text-hi);
    margin: var(--sp-3) var(--sp-4);
  }

  /* ===================================================
     Bottom navigation — thumb zone, native app feel
     =================================================== */
  .bottomnav{
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 64px;
    background: var(--surface);
    border-top: 1px solid var(--line);
    display: flex;
    padding-bottom: env(safe-area-inset-bottom);
    z-index: 20;
  }

  .navitem{
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    background: none;
    border: none;
    color: var(--text-lo);
    padding: 8px 0 6px;
    position: relative;
  }

  .navitem svg{ width: 20px; height: 20px; }

  .navitem span{
    font-family: var(--f-display);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .navitem.active{ color: var(--blue); }

  .navitem.active::before{
    content:"";
    position: absolute;
    top: 0; left: 50%;
    transform: translateX(-50%);
    width: 24px; height: 2px;
    background: var(--blue);
  }

  .navitem:disabled{ opacity: 0.4; }

  /* Refresh action, inline within top bar area instead of giant button */
  .refresh-tap{
    background: none;
    border: none;
    color: var(--blue);
    font-family: var(--f-mono);
    font-size: 10px;
    padding: 8px;
    min-width: 44px;
    min-height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .refresh-tap:focus-visible, .navitem:focus-visible{
    outline: 2px solid var(--blue);
    outline-offset: -2px;
  }

  footer{
    padding: var(--sp-4);
    font-family: var(--f-mono);
    font-size: 9px;
    color: var(--text-lo);
    letter-spacing: 0.04em;
  }
</style>
</head>
<body>

  <div class="topbar">
    <div class="brand">
      <span class="brand-mark"></span>
      <span class="brand-title">Precio Dólar</span>
    </div>
    <div class="live">
      <span class="live-dot pulsing" id="liveDot"></span>
      <span id="liveText">cargando</span>
    </div>
  </div>

  <div class="content">

    <div class="error-banner" id="errorBox"></div>

    <div class="section-label">
      <span>P2P</span>
      <span class="idx">01</span>
    </div>
    <div class="list">
      <div class="row buy">
        <div class="row-left">
          <span class="row-chip"></span>
          <span class="row-label">Compra</span>
        </div>
        <span class="row-value" id="p2p_compra">—<span class="unit">Bs.</span></span>
      </div>
      <div class="row sell">
        <div class="row-left">
          <span class="row-chip"></span>
          <span class="row-label">Venta</span>
        </div>
        <span class="row-value" id="p2p_venta">—<span class="unit">Bs.</span></span>
      </div>
    </div>

    <div class="section-label">
      <span>Banco Central</span>
      <span class="idx">02</span>
    </div>
    <div class="list">
      <div class="row buy">
        <div class="row-left">
          <span class="row-chip"></span>
          <span class="row-label">Compra</span>
        </div>
        <span class="row-value" id="bcb_compra">—<span class="unit">Bs.</span></span>
      </div>
      <div class="row sell">
        <div class="row-left">
          <span class="row-chip"></span>
          <span class="row-label">Venta</span>
        </div>
        <span class="row-value" id="bcb_venta">—<span class="unit">Bs.</span></span>
      </div>
    </div>

    <div class="section-label">
      <span>Ratio de liquidez</span>
      <span class="idx">03</span>
    </div>
    <div class="ratio-module">
      <div class="ratio-head">
        <span class="ratio-value" id="ratio_num">—</span>
        <span class="ratio-tag" id="ratio_tag">—</span>
      </div>
      <div class="ratio-bar">
        <div class="ratio-bar-fill" id="ratio_fill"></div>
      </div>
      <div class="ratio-ticks">
        <span>0.00</span>
        <span>0.35</span>
        <span>0.60</span>
        <span>1.00</span>
      </div>
    </div>

    <div class="meta-grid">
      <div class="meta-cell">
        <div class="meta-label">Fecha</div>
        <div class="meta-value" id="fecha">—</div>
      </div>
      <div class="meta-cell">
        <div class="meta-label">Hora</div>
        <div class="meta-value" id="hora">—</div>
      </div>
    </div>

    <footer>PROYECTO HUGO · ACTUALIZA CADA 60S</footer>

  </div>

  <div class="bottomnav">
    <button class="navitem active" aria-current="page">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
        <path d="M4 11.5L12 4l8 7.5"/>
        <path d="M6 10v9h12v-9"/>
      </svg>
      <span>Inicio</span>
    </button>
    <button class="navitem" disabled>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
        <path d="M4 19V13"/>
        <path d="M10 19V8"/>
        <path d="M16 19v-6"/>
        <path d="M22 19V4"/>
      </svg>
      <span>Historial</span>
    </button>
    <button class="navitem" id="refreshNav">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
        <path d="M20 12a8 8 0 1 1-2.34-5.66"/>
        <path d="M20 4v5h-5"/>
      </svg>
      <span>Actualizar</span>
    </button>
  </div>

<script>
  const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTf7dd0jhXZizVAdJZ66p4qcO3yYF5U7gvs29f81WiX6UHse00zeBr8keuJhBeU28JpXE7gbOv-gfCE/pub?gid=1813400485&single=true&output=csv";
  const REFRESH_MS = 60 * 1000;

  function parseCSV(text){
    const lines = text.trim().split("\n").filter(l => l.length > 0);
    return lines.map(line => line.split(",").map(cell => cell.trim().replace(/^"|"$/g, "")));
  }

  function setLive(ok, msg){
    document.getElementById('liveDot').classList.toggle('off', !ok);
    document.getElementById('liveText').textContent = msg;
  }

  function showError(msg){
    const box = document.getElementById('errorBox');
    box.style.display = 'flex';
    box.textContent = msg;
  }

  function hideError(){
    document.getElementById('errorBox').style.display = 'none';
  }

  function actualizarRatio(valor){
    const num = Number(valor);
    const numEl = document.getElementById('ratio_num');
    const tagEl = document.getElementById('ratio_tag');
    const fillEl = document.getElementById('ratio_fill');

    numEl.textContent = isNaN(num) ? '—' : num.toFixed(2);

    let cls, texto, colorVar;
    if(isNaN(num)){
      cls = 'green'; texto = '—'; colorVar = 'var(--text-lo)';
    } else if(num < 0.35){
      cls = 'green'; texto = 'Posible subida'; colorVar = 'var(--green)';
    } else if(num <= 0.6){
      cls = 'amber'; texto = 'Posible estabilización'; colorVar = 'var(--amber)';
    } else {
      cls = 'red'; texto = 'Posible bajada'; colorVar = 'var(--red)';
    }

    tagEl.className = 'ratio-tag ' + cls;
    tagEl.textContent = texto;
    numEl.style.color = colorVar;

    const pct = isNaN(num) ? 0 : Math.min(Math.max(num, 0), 1) * 100;
    fillEl.style.width = pct + '%';
    fillEl.style.background = colorVar;
  }

  async function cargarDatos(){
    setLive(true, 'actualizando');
    try{
      const res = await fetch(CSV_URL + (CSV_URL.includes('?') ? '&' : '?') + 'cachebust=' + Date.now());
      if(!res.ok) throw new Error('HTTP ' + res.status);
      const text = await res.text();
      const rows = parseCSV(text);

      if(rows.length < 2) throw new Error('Sin filas de datos');

      const ultimaFila = rows[rows.length - 1];
      const [fecha, hora, p2pCompra, p2pVenta, bcbCompra, bcbVenta, ratioLiquidez] = ultimaFila;

      document.getElementById('fecha').textContent = fecha || '—';
      document.getElementById('hora').textContent = hora || '—';
      document.getElementById('p2p_compra').innerHTML = (Number(p2pCompra).toFixed(2) || '—') + '<span class="unit">Bs.</span>';
      document.getElementById('p2p_venta').innerHTML = (Number(p2pVenta).toFixed(2) || '—') + '<span class="unit">Bs.</span>';
      document.getElementById('bcb_compra').innerHTML = (Number(bcbCompra).toFixed(2) || '—') + '<span class="unit">Bs.</span>';
      document.getElementById('bcb_venta').innerHTML = (Number(bcbVenta).toFixed(2) || '—') + '<span class="unit">Bs.</span>';
      actualizarRatio(ratioLiquidez);

      hideError();
      setLive(true, 'en línea');
    } catch(err){
      showError('Error al cargar datos: ' + err.message);
      setLive(false, 'error');
      console.error(err);
    }
  }

  document.getElementById('refreshNav').addEventListener('click', cargarDatos);

  cargarDatos();
  setInterval(cargarDatos, REFRESH_MS);
</script>

</body>
</html>
