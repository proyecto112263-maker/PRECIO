<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1,viewport-fit=cover">

<title>Precio Dólar</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<style>

:root{

--bg:#070809;
--panel:#101214;
--panel2:#15181b;

--line:#202327;

--text:#F3F5F7;
--text2:#B4BBC4;
--text3:#6C737D;

--blue:#49A6FF;
--green:#43D889;
--red:#FF6666;
--orange:#F5A623;

--radius:6px;

--s1:4px;
--s2:8px;
--s3:12px;
--s4:16px;
--s5:20px;
--s6:24px;

}

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

html{

height:100%;

}

body{

height:100%;

background:var(--bg);

color:var(--text);

font-family:Inter,sans-serif;

font-size:14px;

overflow-x:hidden;

}

button{

font:inherit;

border:none;

background:none;

color:inherit;

cursor:pointer;

}

.app{

max-width:460px;

margin:auto;

min-height:100vh;

display:flex;

flex-direction:column;

}

header{

height:56px;

display:flex;

align-items:center;

justify-content:space-between;

padding:0 18px;

border-bottom:1px solid var(--line);

position:sticky;

top:0;

background:#070809ee;

backdrop-filter:blur(20px);

z-index:100;

}

.logo{

display:flex;

align-items:center;

gap:10px;

}

.logoDot{

width:8px;

height:8px;

background:var(--blue);

border-radius:2px;

}

.logoText{

font-size:15px;

font-weight:700;

letter-spacing:.06em;

text-transform:uppercase;

}

.live{

display:flex;

align-items:center;

gap:6px;

font-size:11px;

color:var(--text2);

font-family:"IBM Plex Mono",monospace;

}

.liveIndicator{

width:6px;

height:6px;

border-radius:50%;

background:var(--green);

box-shadow:0 0 8px var(--green);

}

main{

flex:1;

padding:16px;

padding-bottom:90px;

}

.screenTitle{

font-size:12px;

color:var(--text3);

letter-spacing:.18em;

text-transform:uppercase;

margin-bottom:12px;

font-weight:600;

}

.module{

margin-bottom:18px;

}

.moduleHeader{

display:flex;

justify-content:space-between;

align-items:center;

margin-bottom:8px;

}

.moduleTitle{

font-size:13px;

font-weight:700;

letter-spacing:.08em;

text-transform:uppercase;

}

.moduleIndex{

font-size:11px;

font-family:"IBM Plex Mono",monospace;

color:var(--text3);

}

.table{

border-top:1px solid var(--line);

}

.item{

display:flex;

justify-content:space-between;

align-items:center;

padding:13px 2px;

border-bottom:1px solid var(--line);

}

.left{

display:flex;

align-items:center;

gap:10px;

}

.bar{

width:3px;

height:26px;

border-radius:20px;

background:#444;

}

.item.buy .bar{

background:var(--green);

}

.item.sell .bar{

background:var(--red);

}

.label{

font-size:13px;

color:var(--text2);

}

.value{

font-family:"IBM Plex Mono",monospace;

font-size:22px;

font-weight:600;

}

.buy .value{

color:var(--green);

}

.sell .value{

color:var(--red);

}

.unit{

font-size:11px;

color:var(--text3);

margin-left:4px;

}

/* ===== Índice de Liquidez: cuadro centrado tipo botón ===== */

.ratioModule{

display:flex;

justify-content:center;

}

.ratioBox{

width:100%;

max-width:280px;

border:1px solid var(--line);

border-radius:14px;

background:var(--panel);

padding:20px 22px 18px;

display:flex;

flex-direction:column;

align-items:center;

text-align:center;

box-shadow:0 0 0 1px rgba(255,255,255,0.02) inset;

transition:.2s;

}

.ratioBox:active{

background:var(--panel2);

}

.ratioTitle{

font-size:11px;

letter-spacing:.16em;

text-transform:uppercase;

color:var(--text3);

font-weight:600;

margin-bottom:10px;

}

.ratioNumber{

font-family:"IBM Plex Mono",monospace;

font-size:34px;

font-weight:700;

margin-bottom:14px;

}

.progress{

width:100%;

height:4px;

background:#1A1D21;

overflow:hidden;

border-radius:10px;

}

.progressFill{

height:100%;

width:0%;

background:var(--green);

transition:.35s;

}

.scale{

display:flex;

justify-content:space-between;

width:100%;

margin-top:8px;

font-size:10px;

font-family:"IBM Plex Mono",monospace;

color:var(--text3);

}

.infoGrid{

display:grid;

grid-template-columns:1fr 1fr;

margin-top:20px;

border-top:1px solid var(--line);

border-bottom:1px solid var(--line);

}

.info{

padding:14px 0;

}

.info:first-child{

padding-right:10px;

border-right:1px solid var(--line);

}

.info:last-child{

padding-left:14px;

}

.infoLabel{

font-size:10px;

letter-spacing:.15em;

text-transform:uppercase;

color:var(--text3);

margin-bottom:5px;

}

.infoValue{

font-size:15px;

font-family:"IBM Plex Mono",monospace;

}

.error{

display:none;

margin-bottom:14px;

padding:10px 12px;

background:#301313;

border-left:2px solid var(--red);

font-size:12px;

color:#fff;

}

.bottomBar{

position:fixed;

left:0;

right:0;

bottom:0;

height:66px;

background:#0E1012;

border-top:1px solid var(--line);

display:flex;

max-width:460px;

margin:auto;

}

.nav{

flex:1;

display:flex;

flex-direction:column;

justify-content:center;

align-items:center;

gap:5px;

font-size:10px;

text-transform:uppercase;

letter-spacing:.08em;

color:var(--text3);

}

.nav svg{

width:20px;

height:20px;

}

.nav.active{

color:var(--blue);

}

.nav.active::before{

content:"";

position:absolute;

top:0;

width:24px;

height:2px;

background:var(--blue);

}

footer{

padding:16px 0;

font-size:10px;

text-align:center;

color:var(--text3);

font-family:"IBM Plex Mono",monospace;

}

@media(max-width:360px){

.value{

font-size:19px;

}

.ratioNumber{

font-size:30px;

}

.logoText{

font-size:14px;

}

}

</style>

</head>
<body>

<div class="app">

<header>

<div class="logo">

<div class="logoDot"></div>

<div class="logoText">
PRECIO DÓLAR
</div>

</div>

<div class="live">

<div class="liveIndicator" id="liveDot"></div>

<span id="liveText">
Cargando
</span>

</div>

</header>

<main>

<div class="error" id="errorBox"></div>

<div class="module">

<div class="screenTitle">
Mercado
</div>

<div class="moduleHeader">

<div class="moduleTitle">
P2P
</div>

<div class="moduleIndex">
01
</div>

</div>

<div class="table">

<div class="item buy">

<div class="left">

<div class="bar"></div>

<div class="label">
Compra
</div>

</div>

<div class="value" id="p2p_compra">

—

<span class="unit">Bs.</span>

</div>

</div>

<div class="item sell">

<div class="left">

<div class="bar"></div>

<div class="label">
Venta
</div>

</div>

<div class="value" id="p2p_venta">

—

<span class="unit">Bs.</span>

</div>

</div>

</div>

</div>

<div class="module">

<div class="moduleHeader">

<div class="moduleTitle">
Banco Central
</div>

<div class="moduleIndex">
02
</div>

</div>

<div class="table">

<div class="item buy">

<div class="left">

<div class="bar"></div>

<div class="label">
Compra
</div>

</div>

<div class="value" id="bcb_compra">

—

<span class="unit">Bs.</span>

</div>

</div>

<div class="item sell">

<div class="left">

<div class="bar"></div>

<div class="label">
Venta
</div>

</div>

<div class="value" id="bcb_venta">

—

<span class="unit">Bs.</span>

</div>

</div>

</div>

</div>

<div class="module ratioModule">

<button class="ratioBox" type="button" id="ratioButton">

<div class="ratioTitle">
Índice de Liquidez
</div>

<div class="ratioNumber" id="ratio_num">

—

</div>

<div class="progress">

<div class="progressFill" id="ratio_fill"></div>

</div>

<div class="scale">

<span>0.00</span>

<span>0.35</span>

<span>0.60</span>

<span>1.00</span>

</div>

</button>

</div>

<div class="infoGrid">

<div class="info">

<div class="infoLabel">

Fecha

</div>

<div class="infoValue" id="fecha">

—

</div>

</div>

<div class="info">

<div class="infoLabel">

Hora

</div>

<div class="infoValue" id="hora">

—

</div>

</div>

</div>

<footer>

PROYECTO HUGO · ACTUALIZA CADA 60S

</footer>

</main>

<div class="bottomBar">

<button class="nav active">

<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">

<path d="M4 11.5L12 4l8 7.5"/>

<path d="M6 10v9h12v-9"/>

</svg>

<span>Inicio</span>

</button>

<button class="nav" disabled>

<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">

<path d="M4 19V13"/>

<path d="M10 19V8"/>

<path d="M16 19v-6"/>

<path d="M22 19V4"/>

</svg>

<span>Historial</span>

</button>

<button class="nav" id="refreshNav">

<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">

<path d="M20 12a8 8 0 1 1-2.3-5.6"/>

<path d="M20 4v5h-5"/>

</svg>

<span>Actualizar</span>

</button>

</div>

<script> 
  const CSV_URL =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vTf7dd0jhXZizVAdJZ66p4qcO3yYF5U7gvs29f81WiX6UHse00zeBr8keuJhBeU28JpXE7gbOv-gfCE/pub?gid=1813400485&single=true&output=csv";

const REFRESH_MS = 60000;

function parseCSV(text){

return text
.trim()
.split("\n")
.filter(l=>l.length)
.map(l=>l.split(",").map(c=>c.trim().replace(/^"|"$/g,"")));

}

function setLive(ok,msg){

const dot=document.getElementById("liveDot");

dot.style.background=ok?"var(--green)":"var(--red)";
dot.style.boxShadow=ok
?"0 0 8px var(--green)"
:"0 0 8px var(--red)";

document.getElementById("liveText").textContent=msg;

}

function showError(msg){

const box=document.getElementById("errorBox");

box.style.display="block";

box.textContent=msg;

}

function hideError(){

document.getElementById("errorBox").style.display="none";

}

function actualizarRatio(valor){

const n=parseFloat(valor);

const num=document.getElementById("ratio_num");

const fill=document.getElementById("ratio_fill");

if(isNaN(n)){

num.textContent="—";

num.style.color="var(--text)";

fill.style.width="0%";

return;

}

num.textContent=n.toFixed(2);

let color;

if(n<0.35){

color="var(--green)";

}else if(n<=0.60){

color="var(--orange)";

}else{

color="var(--red)";

}

num.style.color=color;

fill.style.width=(Math.min(n,1)*100)+"%";

fill.style.background=color;

}

async function cargarDatos(){

setLive(true,"Actualizando");

try{

const r=await fetch(
CSV_URL+"&t="+Date.now()
);

if(!r.ok){

throw new Error("HTTP "+r.status);

}

const txt=await r.text();

const rows=parseCSV(txt);

const u=rows[rows.length-1];

const[
fecha,
hora,
p2pCompra,
p2pVenta,
bcbCompra,
bcbVenta,
ratio
]=u;

document.getElementById("fecha").textContent=fecha||"—";

document.getElementById("hora").textContent=hora||"—";

document.getElementById("p2p_compra").innerHTML=
Number(p2pCompra).toFixed(2)+
'<span class="unit"> Bs.</span>';

document.getElementById("p2p_venta").innerHTML=
Number(p2pVenta).toFixed(2)+
'<span class="unit"> Bs.</span>';

document.getElementById("bcb_compra").innerHTML=
Number(bcbCompra).toFixed(2)+
'<span class="unit"> Bs.</span>';

document.getElementById("bcb_venta").innerHTML=
Number(bcbVenta).toFixed(2)+
'<span class="unit"> Bs.</span>';

actualizarRatio(ratio);

hideError();

setLive(true,"En línea");

}catch(e){

console.error(e);

showError("Error al obtener datos");

setLive(false,"Sin conexión");

}

}

document
.getElementById("refreshNav")
.addEventListener("click",cargarDatos);

cargarDatos();

setInterval(cargarDatos,REFRESH_MS);

</script>

</body>

</html>
