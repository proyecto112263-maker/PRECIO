<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Precio Dólar</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap');

  :root{
    --bg: #05070d;
    --glass: rgba(255,255,255,0.04);
    --glass-border: rgba(255,255,255,0.09);
    --blue-glow: #4d8dff;
    --blue-soft: rgba(77,141,255,0.35);
    --green: #4ade9a;
    --orange: #ffab4d;
    --red: #ff5d6c;
    --text: #f3f6fc;
    --muted: #8993ab;
    --display: 'Manrope', sans-serif;
    --mono: 'IBM Plex Mono', monospace;
  }

  *{ box-sizing: border-box; }

  html, body{
    margin:0; padding:0; min-height:100vh;
    background: var(--bg);
    color: var(--text);
    font-family: var(--display);
    overflow-x: hidden;
  }

  body{
    background:
      radial-gradient(ellipse 900px 600px at 15% -10%, rgba(77,141,255,0.22), transparent 55%),
      radial-gradient(ellipse 700px 500px at 100% 15%, rgba(77,141,255,0.12), transparent 50%),
      radial-gradient(ellipse 800px 600px at 50% 120%, rgba(77,141,255,0.10), transparent 55%),
      var(--bg);
  }

  @keyframes fadeUp{
    from{ opacity: 0; transform: translateY(14px); }
    to{ opacity: 1; transform: translateY(0); }
  }

  .wrap{
    max-width: 860px;
    margin: 0 auto;
    padding: 70px 26px 60px;
  }

  header{
    text-align: center;
    margin-bottom: 56px;
    animation: fadeUp 0.7s ease both;
  }

  h1{
    font-size: 44px;
    font-weight: 800;
    margin: 0;
    letter-spacing: -0.02em;
    background: linear-gradient(180deg, #ffffff 0%, #b9cdfd 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    text-shadow: 0 0 40px rgba(77,141,255,0.25);
  }

  .status{
    display: inline-flex;
    align-items: center;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
    margin-top: 16px;
  }

  .dot{
    display:inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--blue-glow);
    margin-right: 7px;
    box-shadow: 0 0 10px var(--blue-glow);
    animation: pulse 2s infinite;
  }

  @keyframes pulse{
    0%,100%{ opacity: 1; }
    50%{ opacity: 0.3; }
  }

  .section{
    margin-bottom: 34px;
    animation: fadeUp 0.8s ease both;
  }
  .section:nth-of-type(2){ animation-delay: 0.08s; }
  .section:nth-of-type(3){ animation-delay: 0.16s; }

  .section-title{
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.01em;
    color: var(--text);
    margin: 0 0 16px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .section-title::before{
    content:"";
    width: 3px;
    height: 22px;
    background: linear-gradient(180deg, var(--blue-glow), transparent);
    border-radius: 2px;
    box-shadow: 0 0 12px var(--blue-glow);
  }

  .panel-row{
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }

  .glass{
    background: var(--glass);
    border: 1px solid var(--glass-border);
    border-radius: 20px;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    transition: transform 0.35s cubic-bezier(.2,.8,.2,1), border-color 0.35s ease, box-shadow 0.35s ease;
  }

  .glass:hover{
    transform: translateY(-4px);
    border-color: var(--blue-soft);
    box-shadow: 0 20px 50px rgba(77,141,255,0.15);
  }

  .panel{
    padding: 26px 24px;
    text-align: center;
  }

  .panel-label{
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--muted);
    margin: 0 0 14px;
  }

  .panel-value{
    font-size: 38px;
    font-weight: 700;
    line-height: 1;
    letter-spacing: -0.01em;
  }

  .panel-value sup{
    font-family: var(--mono);
    font-size: 13px;
    color: var(--muted);
    font-weight: 400;
    margin-left: 6px;
  }

  .panel.buy .panel-value{ color: var(--green); }
  .panel.sell .panel-value{ color: var(--red); }

  .ratio-panel{
    padding: 28px 26px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
  }

  .ratio-left{ display: flex; flex-direction: column; gap: 6px; }

  .ratio-num{
    font-size: 40px;
    font-weight: 800;
    line-height: 1;
    transition: color 0.4s ease;
  }

  .ratio-badge{
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 500;
    padding: 8px 16px;
    border-radius: 999px;
    letter-spacing: 0.02em;
    white-space: nowrap;
  }

  .ratio-badge.green{ color: var(--green); background: rgba(74,222,154,0.12); border: 1px solid rgba(74,222,154,0.3); }
  .ratio-badge.orange{ color: var(--orange); background: rgba(255,171,77,0.12); border: 1px solid rgba(255,171,77,0.3); }
  .ratio-badge.red{ color: var(--red); background: rgba(255,93,108,0.12); border: 1px solid rgba(255,93,108,0.3); }

  .meta-row{
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 40px;
  }

  .meta{
    padding: 18px 20px;
    text-align: center;
  }

  .meta-label{
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    margin: 0 0 8px;
  }

  .meta-value{
    font-family: var(--mono);
    font-size: 16px;
    font-weight: 500;
    color: var(--text);
  }

  footer{
    text-align: center;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.1em;
    color: var(--muted);
    opacity: 0.55;
  }

  .error-box{
    background: rgba(255,93,108,0.08);
    border: 1px solid rgba(255,93,108,0.3);
    color: var(--red);
    border-radius: 14px;
    padding: 14px 18px;
    font-family: var(--mono);
    font-size: 12px;
    margin-bottom: 24px;
    display: none;
    text-align: center;
  }

  @media (max-width: 560px){
    .panel-row, .meta-row{ grid-template-columns: 1fr 1fr; }
    .panel-value{ font-size: 28px; }
    h1{ font-size: 32px; }
    .ratio-panel{ flex-direction: column; align-items: flex-start; }
  }
</style>
</head>
<body>

<div class="wrap">

  <header>
    <h1>Precio Dólar</h1>
    <div class="status" id="status">
      <span class="dot"></span>cargando…
    </div>
  </header>

  <div class="error-box" id="errorBox"></div>

  <div class="section">
    <p class="section-title">P2P</p>
    <div class="panel-row">
      <div class="glass panel buy">
        <p class="panel-label">Compra</p>
        <div class="panel-value" id="p2p_compra">—<sup>Bs.</sup></div>
      </div>
      <div class="glass panel sell">
        <p class="panel-label">Venta</p>
        <div class="panel-value" id="p2p_venta">—<sup>Bs.</sup></div>
      </div>
    </div>
  </div>

  <div class="section">
    <p class="section-title">Banco Central</p>
    <div class="panel-row">
      <div class="glass panel buy">
        <p class="panel-label">Compra</p>
        <div class="panel-value" id="bcb_compra">—<sup>Bs.</sup></div>
      </div>
      <div class="glass panel sell">
        <p class="panel-label">Venta</p>
        <div class="panel-value" id="bcb_venta">—<sup>Bs.</sup></div>
      </div>
    </div>
  </div>

  <div class="section">
    <p class="section-title">Ratio de liquidez</p>
    <div class="glass ratio-panel">
      <div class="ratio-left">
        <div class="ratio-num" id="ratio_num">—</div>
      </div>
      <div class="ratio-badge" id="ratio_badge">—</div>
    </div>
  </div>

  <div class="meta-row">
    <div class="glass meta">
      <p class="meta-label">Fecha</p>
      <p class="meta-value" id="fecha">—</p>
    </div>
    <div class="glass meta">
      <p class="meta-label">Hora</p>
      <p class="meta-value" id="hora">—</p>
    </div>
  </div>

  <footer>Proyecto Hugo</footer>

</div>

<script>
  const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTf7dd0jhXZizVAdJZ66p4qcO3yYF5U7gvs29f81WiX6UHse00zeBr8keuJhBeU28JpXE7gbOv-gfCE/pub?gid=1813400485&single=true&output=csv";

  const REFRESH_MS = 60 * 1000;

  function parseCSV(text){
    const lines = text.trim().split("\n").filter(l => l.length > 0);
    return lines.map(line => line.split(",").map(cell => cell.trim().replace(/^"|"$/g, "")));
  }

  function setStatus(ok, msg){
    const el = document.getElementById('status');
    if(ok){
      el.innerHTML = '<span class="dot"></span>' + msg;
    } else {
      el.innerHTML = '<span class="dot" style="background:var(--red);box-shadow:0 0 10px var(--red)"></span>' + msg;
    }
  }

  function showError(msg){
    const box = document.getElementById('errorBox');
    box.style.display = 'block';
    box.textContent = msg;
  }

  function hideError(){
    document.getElementById('errorBox').style.display = 'none';
  }

  function actualizarRatio(valor){
    const num = Number(valor);
    const numEl = document.getElementById('ratio_num');
    const badgeEl = document.getElementById('ratio_badge');

    numEl.textContent = isNaN(num) ? '—' : num.toFixed(2);

    let color, texto;
    if(isNaN(num)){
      color = 'green'; texto = '—';
    } else if(num < 0.35){
      color = 'green'; texto = 'Posible subida';
    } else if(num <= 0.6){
      color = 'orange'; texto = 'Posible estabilización';
    } else {
      color = 'red'; texto = 'Posible bajada';
    }

    const colorVar = color === 'green' ? 'var(--green)' : color === 'orange' ? 'var(--orange)' : 'var(--red)';
    numEl.style.color = colorVar;

    badgeEl.className = 'ratio-badge ' + color;
    badgeEl.textContent = texto;
  }

  async function cargarDatos(){
    try{
      const res = await fetch(CSV_URL + (CSV_URL.includes('?') ? '&' : '?') + 'cachebust=' + Date.now());
      if(!res.ok) throw new Error('HTTP ' + res.status);
      const text = await res.text();
      const rows = parseCSV(text);

      if(rows.length < 2) throw new Error('Sin filas de datos');

      const ultimaFila = rows[rows.length - 1];
      const [fecha, hora, p2pCompra, p2pVenta, bcbCompra, bcbVenta, ratioLiquidez] = ultimaFila;

      document.getElementById('fecha').textContent = fecha || '—';
      document.getElementById('hora').textContent = hora || '—';
      document.getElementById('p2p_compra').innerHTML = (Number(p2pCompra).toFixed(2) || '—') + '<sup>Bs.</sup>';
      document.getElementById('p2p_venta').innerHTML = (Number(p2pVenta).toFixed(2) || '—') + '<sup>Bs.</sup>';
      document.getElementById('bcb_compra').innerHTML = (Number(bcbCompra).toFixed(2) || '—') + '<sup>Bs.</sup>';
      document.getElementById('bcb_venta').innerHTML = (Number(bcbVenta).toFixed(2) || '—') + '<sup>Bs.</sup>';
      actualizarRatio(ratioLiquidez);

      hideError();
      setStatus(true, 'actualizado ' + new Date().toLocaleTimeString('es-BO'));
    } catch(err){
      showError('Error al cargar datos: ' + err.message);
      setStatus(false, 'error');
      console.error(err);
    }
  }

  cargarDatos();
  setInterval(cargarDatos, REFRESH_MS);
</script>

</body>
</html>
